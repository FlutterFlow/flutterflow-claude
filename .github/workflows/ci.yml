name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; the release job opts up to contents: write.
permissions:
  contents: read

jobs:
  validate:
    name: Manifests, lint & security properties
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON manifests
        run: |
          for f in \
            .claude-plugin/marketplace.json \
            plugins/flutterflow/.claude-plugin/plugin.json \
            plugins/flutterflow/hooks/hooks.json \
            plugins/flutterflow/mcp.example.json; do
            python3 -c "import json; json.load(open('$f'))" && echo "ok: $f"
          done

      - name: Check plugin metadata invariants
        run: |
          python3 - <<'PY'
          import json, os
          m = json.load(open("plugins/flutterflow/.claude-plugin/plugin.json"))
          assert m.get("version"), "plugin.json is missing a version"
          print("version:", m["version"])
          # marketplace deliberately omits version so the two can't drift
          mk = json.load(open(".claude-plugin/marketplace.json"))
          for p in mk["plugins"]:
              assert "version" not in p, "marketplace entry should not pin a version"
          # hooks.json must reference a script that exists
          h = json.load(open("plugins/flutterflow/hooks/hooks.json"))
          cmd = h["hooks"]["SessionStart"][0]["hooks"][0]["command"]
          assert "session-start.sh" in cmd, "SessionStart hook command changed"
          assert os.path.exists("plugins/flutterflow/hooks/session-start.sh"), "hook script missing"
          print("metadata invariants ok")
          PY

      - name: Shell syntax
        run: |
          bash -n plugins/flutterflow/hooks/session-start.sh
          bash -n plugins/flutterflow/hooks/session-start.test.sh
          bash -n plugins/flutterflow/scripts/store-key-from-clipboard.sh
          bash -n plugins/flutterflow/scripts/store-key-from-clipboard.test.sh

      - name: ShellCheck (advisory)
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck -S warning plugins/flutterflow/hooks/session-start.sh || true
            shellcheck -S warning plugins/flutterflow/scripts/store-key-from-clipboard.sh || true
          else
            echo "shellcheck not available — skipping"
          fi

      - name: Security-property tests
        run: |
          bash plugins/flutterflow/hooks/session-start.test.sh
          bash plugins/flutterflow/scripts/store-key-from-clipboard.test.sh

  plugin-validate:
    name: claude plugin validate (best-effort)
    runs-on: ubuntu-latest
    # Non-blocking: depends on the external Claude Code CLI being installable in
    # CI. The `validate` job above is the authoritative gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate plugin (strict)
        run: claude plugin validate ./plugins/flutterflow --strict

  release:
    name: Tag & release on version bump
    runs-on: ubuntu-latest
    needs: [validate] # only release a commit whose manifests + security tests passed
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write # create the tag and the GitHub release
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Read plugin version
        id: ver
        run: |
          v=$(python3 -c "import json; print(json.load(open('plugins/flutterflow/.claude-plugin/plugin.json'))['version'])")
          case "$v" in
            [0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "::error::Unexpected version '$v' in plugin.json"; exit 1 ;;
          esac
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Plugin version: $v"

      - name: Create release if the tag doesn't exist
        env:
          GH_TOKEN: ${{ github.token }}
          # Passed via env (not inline ${{ }}) so the value can't be interpreted as shell.
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          tag="v${VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — nothing to do."
            exit 0
          fi
          # A bare tag without a release would make `gh release create` publish off
          # the tag's existing (possibly stale) commit and silently ignore --target.
          # Refuse rather than release the wrong commit.
          if gh api "repos/$GITHUB_REPOSITORY/git/refs/tags/$tag" >/dev/null 2>&1; then
            echo "::error::Tag $tag exists but has no release. Reconcile manually (delete the tag or create the release from it) — refusing to release off a possibly-stale commit."
            exit 1
          fi
          echo "Creating release $tag at $GITHUB_SHA"
          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --generate-notes \
            --latest
